apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  labels:
    app: nginx-web
spec:
  containers:
  - name: nginx
    image: nginx:latest
    ports:
    - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx-web
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80