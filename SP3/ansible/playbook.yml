---
- name: Install Jenkins and Nginx as Reverse Proxy
  hosts: jenkins_master
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install OpenJDK 17 and dependencies
      apt:
        name: 
          - openjdk-17-jdk
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Add Jenkins GPG key using ID
      apt_key:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
        id: 7198F4B714ABFC68
        state: present

    - name: Add Jenkins repository
      apt_repository:
        repo: "deb https://pkg.jenkins.io/debian-stable binary/"
        state: present
        filename: jenkins

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present
        update_cache: yes

    - name: Ensure Jenkins is started
      service:
        name: jenkins
        state: started
        enabled: yes

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Configure Nginx as reverse proxy
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://localhost:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }

    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded